name: Databricks Deploy
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Databricks CLI
      - name: Install Databricks CLI
        run: |
          curl -L https://github.com/databricks/cli/releases/download/v0.295.0/databricks_cli_0.295.0_linux_amd64.tar.gz -o databricks.tar.gz
          tar -xzf databricks.tar.gz
          sudo mv databricks /usr/local/bin/databricks
          sudo chmod +x /usr/local/bin/databricks
          databricks --version

      # Bundle deploy
      - name: Bundle deploy
        env:
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
        run: |
          echo "Host: $DATABRICKS_HOST"
          databricks bundle validate -t dev
          databricks bundle deploy -t dev

      # Cleanup step (always runs)
      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up temporary files..."
          rm -f databricks.tar.gz
          rm -f databricks
          rm -rf .bundle
          echo "Cleanup completed."
