# This is a Databricks asset bundle definition for dbx.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dbx

include:
  - resources/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-84d873a5-607b.cloud.databricks.com
      root_path: /Workspace/Users/95929ca9-2428-4208-857f-27e5600392b2/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: 95929ca9-2428-4208-857f-27e5600392b2
        level: CAN_MANAGE
    run_as:
      service_principal_name: 95929ca9-2428-4208-857f-27e5600392b2

  prod:
    mode: production
    workspace:
      host: https://dbc-84d873a5-607b.cloud.databricks.com
      # We explicitly specify /Workspace/Users/95929ca9-2428-4208-857f-27e5600392b2 to make sure we only have a single copy.
      root_path: /Workspace/Users/95929ca9-2428-4208-857f-27e5600392b2/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: 95929ca9-2428-4208-857f-27e5600392b2
        level: CAN_MANAGE
    run_as:
      service_principal_name: 95929ca9-2428-4208-857f-27e5600392b2
